body:
  text: 明本釋儒家類提要臣等謹案明本釋三卷宋劉荀撰荀東平人尚書左僕射摯之孫書中所稱先文肅公即謂摯也孝宗時嘗知盱眙軍其事迹則不可考矣是書乃其講學之語大旨謂致力當求其本因舉其切要者三十三條各為標目而著論以發明之論所不盡者又自為之註中多稱引元祐諸人程門諸子及同時胡宏張九成朱子之言持論頗醇正其文率詳明愷切務逹其意而止北宋諸名臣之言行出處亦附注焉葢黨籍子孫尊其先世之舊聞也宋史藝文志眺公武讀書志皆不載陳振孫書録解題馬端臨經籍考但載荀所載建炎徳安守禦録而是書亦畧焉惟明文淵閣書目國史經籍志有之蓋其書在宋不甚顯至元明間始行於世也楊士竒焦竑皆作明本二卷劉荀撰然永樂大典所載實皆題曰明本釋疑其書原名明本或後人因其註而増題釋字歟乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b5266a7e3ffcc47bd7c0fd7d59df7045926da3d8bc848de23dc85001b579af45
