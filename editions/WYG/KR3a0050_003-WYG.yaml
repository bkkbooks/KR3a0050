body:
  text: 明本釋卷下宋劉荀撰立志者有為之本尚書周官曰戒爾卿士功崇惟志東坡謂未有志卑而功崇者胡衡麓謂心之所存主謂之志伊尹曰吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉予天民之先覺者也予将以此道覺此民也思天下之民有不與被堯舜之澤者如己推而納之溝中王荆公謂王逢原曰伊尹可謂愛天下也然湯聘之猶囂囂然曰與我處畎畆之中由是以樂堯舜之道豈若彼所謂憂天下者歟僕自枉而幸售其道哉顔淵曰舜何人也予何人也有為者亦若是濂溪云志伊尹之所志學顔子之所學過則聖及則賢若不及則亦不失於令名胡文定公曰有志於學者當以聖人為則有志於天下者當以宰相自期降此不足道矣范文正公自少慨然有志於天下常曰士當先天下之憂而憂後天下之樂而樂石徂徠曰士之積道徳富仁義於厥身葢假於權位以布諸行事利於天下也豈有屑屑然謀於衣食者歟王沂公曰曽平生之志不在温飽胡文定公曰嘗愛諸葛孔明應劉先主之聘宰割山河三分天下身都宰相手握重兵亦何求而不得何欲而不遂卻與後主言成都有桑八百株薄田十五頃子弟衣食自有饒餘臣身在外别無調度不别治生以長尺寸若死之日不使廩有餘財以負陛下及卒果如其言如此輩人真可謂大丈夫矣侯師聖曰事君者以行道為志非為禄也然亦有時而為貧若專以食為事則厮役之為志也胡衡麓論管仲之器小哉以為不能約節肆於驕僭由器量不宏不可大受故也然則得君專政豈有正己及物之意直欲償其富貴之願而已此與兒女子充足於輿馬服食器用之間何以異非小器而何又云士之器大槩有三志於道徳者功名不累其心志於功名者富貴不累其心志於富貴者苟富貴而已則亦無所不至矣孔子所謂鄙夫之心事也楊龜山謂楊仲逺云外勢利聲色不為流俗詭譎之行於學者未足道也吾子勉之又恐其以此自足也易曰德薄而位尊知小而謀大力小而任重鮮不及矣漢上謂小人志於得而已以人之國倖僥萬一鮮不取禍横渠曰德未成而先以功業為事是代大匠斵希不傷手也邵康節詩曰慎勿輕言天下事伊周殊不是庸人明道亦云所見所期不可不逺且大然行之亦須量力有漸志大心勞力小任重恐終敗事又不可以不知此理也𢎞毅者任重致逺之本曽子曰士不可以不𢎞毅任重而道逺伊川曰𢎞寛廣也毅奮發也𢎞而不毅則無規矩毅而不𢎞則隘陋昔王文正公局量寛厚未嘗見其怒接物若甚和易而當官涖事莊厲不可犯在中書有事關密院礙詔格冦萊公在樞府以聞上以責公不踰月密院有事送中書亦違舊詔吏欣然呈公公曰不可學它不是卻送與密院萊公曰同年甚得許大度量公任事久人有謗公於上者公輒引咎未嘗自辨至人有過雖人主盛怒可辨者辨之必得而後已富鄭公為人温良寛厚汎與人語若無所異同者及其臨大節正色慷慨莫之能屈趙宗道出公門下公守亳社宗道季子濟為提舉常平劾公不行新法罷使相移汝州後宗道卒公賻恤其家甚厚服除濟偕諸兄以送富公撫之甚恩濟不自安起謝罪公曰吾見故人子前日公事不可論也陳述古曰大丈夫當容人勿為人所容韓魏公器量過人功葢天下位冠人臣不見其喜伊川云别事人都强得惟識量不可强如鄧艾位三公年七十處得甚好及因下蜀有功便動了謝安當謝𤣥破苻堅對客圍棊報至不喜及歸折屐齒强終不得又云堯舜事業亦只如太虛中一㸃浮雲之過日竊謂士之矜能伐善者知此亦可少媿矣任莫大之責蹈不測之禍身危於累卵不見其憂怡然有常未嘗為事物遷動平居容人過失不以為忤小大無所較計及朝廷事則守其所當爭至義理而後止毅然終不可奪嘗言在政府時極有難處事葢天下事無有盡如意須索索包總不然不可一日處矣毎遇大事即以死自處臨事若慮得是劄定腳做便更不移成敗則任它凡人語及其不平氣必動色必變辭必厲惟公不然更説到小人忘恩負義欲傾己處辭和氣平如道尋常事其任重致逺者宜矣勇者為義之本中庸謂勇天下之達德子曰見義不為無勇也又曰勇者不懼謝上蔡曰雖死生分内事本無可懼中無主則懼韓魏公謂勇可習胡衡麓曰養氣然後勇詳孟子養氣之義則得之孟子謂舜聞一善言見一善行若決江河沛然莫之能禦也又語滕文公曰若夫成功則天也强為善而已石徂徠以謂時無不可為為之無不至雖獲禍咎至死而不悔明道亦曰職事不可以巧免劉元城曰温公當揆日葢知後必有反覆之禍然仁人君子如救焚拯溺何暇論後日事伊川曰凡為政必立善法後人有所變易則無可奈何雖周公亦知立法而已温公行状云公病革諄諄不復自覺如夢中語然皆朝廷事也既没其家得遺奏八紙上之皆手札當世要務與後人姑作一二事以塞責要譽終不更為者異矣歐陽文忠公戒其子姪守官存心盡公切不可思避事至於臨難死節亦是汝榮事今門之訓多反是者亦習俗使然也大抵食焉而怠其事先賢之所深戒或問子畏於匡設使孔子遇害顔子死之否伊川曰豈特顔子之於孔子若二人同行遇難自可相死也又問親在則如之何曰且譬二人捕虎一人盡力須當同去用力如執干戈衛社稷到急處便逃去言我有親是大不義當此時豈問有親但當豫前謂吾有親不可行則止豈到臨時卻自規避也慶厯二年契丹重兵壓境欲得關南十縣使來非時仁宗命擇報聘者時虜情不可測羣臣皆莫敢行富鄭公知制誥宰相舉之公即入對曰主憂臣辱臣不敢愛其死遂命公報聘而契丹平後坐石守道謗徙青州讒者不已人皆危懼㑹河北大水流民東下者六七十萬人公一皆招納有勸公非所以處疑弭謗禍且不測公傲然不顧曰吾豈以一身易此六七十萬人之命哉卒行之愈力韓魏公曰當仁宗之末英宗之初朝廷多故公臨大節處危疑茍利國家知無不為若湍水之赴深壑無所疑憚或諫曰公所為如是誠善萬一蹉跌豈惟身不自保恐家無處所殆非明哲之所尚也公歎曰此何言也凡為人臣者當盡力事君死生以之顧事之是非何如耳至於成敗天也豈可豫憂其不成遂輟不為哉聞者愧服前賢義當為而不顧害者多矣是亦度德量力自知其可以有為也語曰陳力就列不能者止邵康節見義吟云見善必為不見則已量力而動力盡而止又戒乎不量力而妄動亦陳力就列之義茍為不然則物我俱敗矣歐陽文忠公尹開封所代包孝肅公以威嚴御下名震都邑公簡易循理不求赫赫之譽有以包公之政勵公者公曰凡人材性不一用其所長事無不舉强其所短勢必不逮吾亦任吾所長耳竊謂在仕者欲勉上官有所立責下位有所為亦須量其人茍强其所不能亦終無成朝廷任賢使能皆當然也此皆量力之事故附記之伊川曰勇一也為用不同有勇於氣者有勇於義者君子勇於義小人勇於氣尹和靖曰義以為上則為勇也大矣子曰君子有勇而無義為亂吕與叔謂君子雖志於善敢勇而無義必有為亂之迹如鬻權兵諫之類孟子曰可以死可以無死死傷勇太史公有言知死必勇非死者難處死者難也楊龜山曰以死教天下乃君子分上常事不足怪然亦須死得是張敬夫曰比干諫而死箕子疑亦可死也而徉狂以避葢以父師之義死之則為傷勇故也胡衡麓謂孔子皆以仁許之仁者當理也又須明此理也果斷者立事之本書周官曰惟克果斷乃罔後艱子曰由也果謂剛毅能任也於從政乎何有邵康節詩若無剛果難成善伊川謂為學須是剛決果敢以進是知為學亦要乎果也范太史云有血氣之剛有志氣之剛始盛而終衰壮鋭而老消此血氣之剛也其靜也正其動也健此志氣之剛也血氣之剛可得而挫也志氣之剛不可得而挫也是故至剛不可不養也東坡曰昔之為人君者患不能斷然而或斷以興亦或以衰晉武之平吳憲宗之征蔡苻堅之南伐宋文之北侵其為斷一也豈可不求其故歟非特人君當然善乎胡衡麓之論曰事有隠忍而濟者當斯時𨼆忍為小濟為大而不能忍則事必不濟謀有決斷而成者當斯時決斷為大所不忍為小而不能割所以不忍則謀必不成商之頑民餘風未殄以周家盛力分擘遷放易如反掌而成康能容忍之為擇師尹俟以悠久數世之後商周為一家必有忍乃有濟謂此類也周襄於鄭親燕丹於秦王戾園於江充曹髦於司馬昭袁紹於田别駕德宗於蕭相國失此者也齊桓於射鉤漢髙於故怨魏孝文於宦者唐太宗於魏徴安石於桓温仲達於曹爽得此者也若夫禍福成敗事将必然方且猶豫遲疑見幾不作貽殃召禍噬臍無及可勝數哉鄭莊不忍違母而成叔段之惡子太叔不忍用猛而滋鄭國之盜成帝不忍廢諸舅而外氏奪之苻堅不忍去鮮卑而慕容叛之明皇不忍除妃子幾死於宿衛之手肅宗不忍逆張后遂父子至死不相見德宗不忍生代主帥遂使唐為藩鎮所分裂梁武不忍遽逐朱异圍於臺城終陷趙主父之覆轍也而其甚者宋文帝已得邵濬謀逆之實徊徨隠度至於累日比将廢黜猶與徐湛之通夕議論燭未及滅而元凶之刄登於合殿矣霍光已知夫人顯令淳于衍毒殺許后之状欲自發舉竟不能決獄事既成署衍勿論身死未幾而霍氏之宗盡已顛覆矣夫天下大謀孰有加於一身之生死國家之存亡乃無大丈夫明斷為婦人女子之姑息一旦以生易死以存易亡而不得免焉彼蔽於一曲闇於大理制於私昵安於目前者曽不知戒可不悲哉慶厯中上用杜祁公范文正公富鄭公任政事滕宗諒守慶州用公使錢坐法杜公欲致重法范公則欲薄其罪富公患是不知所決孫公之翰歎曰法者人主之操柄今富公患重罪宗諒則違范公薄其罪則違杜公是不知有法而未嘗意在人主也此明於大理言也竊謂事當決斷而不斷與當隠忍而不忍皆謂之無斷可也其於受害均矣守正者立朝之本子曰不能正其身如正人何孟子曰未聞枉已而正人者也況辱己以正天下者乎又曰枉尺直尋者以利言也如以利則枉尋直尺而利亦可為與枉己者未有能直人者也楊龜山曰古之人寜道之不行而不輕其去就孔孟至終不得行而死豈不欲道之行哉伊川謂較其大小其弊為枉尺直尋之病也伊川曰臣貴正不貴權伊川曰學者未嘗知權之義於理所不可則曰姑從權是以權為變詐之術也夫臨事之變稱輕重而處之以合於義是之謂權豈拂經之道哉邵康節曰權所以平物之輕重聖人行權酌其輕重而行之合其宜而已故執中無權者猶為偏也吕與叔謂執中無權雖君子所惡苟無忌惮則不若無權之為愈賈存道謂權無規矩用無常不可專言以教人伊川又曰多權者害誠范太史謂權無難權者道之用也惟聖人能盡之又曰正者萬世之常權者一時之用常者中人以下可以守權非體道者不能也故曰可與立未可與權賈存道名同字希徳孫泰山之師友學者諡曰存道石徂徠為之撰行状云又曰不正而合未有久而不離者或問韓非作説難而卒死乎説難何反也揚雄曰説難葢其所以死乎君子以禮動以義止合則進否則退確乎不憂其不合也夫説人而憂其不合則亦無所不至矣先忠肅公在熙寜初王荆公稱其器識擢為中書檢正繼除御史既對神宗問從學王安石否公對曰臣東北人少孤獨學不識安石也即上疏乃言新法不便司農劾公中懐向背有㫖分析公奏曰臣所向者義所背者利所向者君父所背者權臣復上疏極論時政願就竄逐元祐初温公當國首薦公云公忠剛正始終不變後公辭免中書侍郎蘇文忠公當批答不允詔云卿蹈道深逺守節純固雖不留於儻來之物而有志於行可之仕樂告以善勇於敢為進不求當世之榮退不叛平生之樂未嘗為枉尺直尋之事此得先世出處大致子孫能守之庶可以言無忝也矣劉元城曰士大夫只㸔臨朝大節如何若大節一虧雖有細行不足贖也東坡立朝大節極可觀又紹聖中以書勉韓儀公曰當斯時尤宜以正道自處萬一丕變事有干涉須力持之不從則奉身而退廢興有命非人力可支惟不失義乃得若目前利害以不屑意為祝昔衛侯言計非是而羣臣和者如出一口子思曰以吾觀衛所謂君不君臣不臣者也夫不察事之是非而悦人讚己闇莫甚焉不度理之所在而阿䛕求容諂莫甚焉若此不已國無類矣孟子謂以順為正者妾婦之道也富鄭公論奏左右皆小人章子厚難之王和父曰吾輩今日曰誠如聖諭明日曰聖學非臣所及安得不謂之小人此語曲盡阿諛情狀竊謂凡事上者皆當戒此也又有拱黙如于志寜者唐髙宗将立武后召長孫無忌褚遂良李勣于志寜決可否無忌遂良以死爭李勣曰陛下家事何須問外人志寜黙無一言或者謂李勣逢君之惡已顯著姦人之情志寜不言則是舞兩端以觀望焉髙宗從無忌等言則已以不言為忠從李勣言則已不言免禍志寜之罪尤甚於勣當矣又有從其大而違其細假以示人至公欲竊天下之虚譽如唐裴樞者其罪尤不容於誅也凡在上位者能用此觀人則君子小人亦得其槩矣夫人之所以如此者不過乎患失耳楊龜山謂謀國乃所以謀身天下不寜而能保其身者未之有也殊不知得失有命了不相干所以先儒有小人可惜為小人之語也得失輕者去就之本子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣孟子謂有官守者不得其職則去有言責者不得其言則去熙寜間新法方興温公時居獻納之位力言不便乞罷制置三司條例司不報㑹除樞密副使即累上疏以謂若臣言果是乞早賜施行果非乞罷樞密副使治臣妄言及違慢之罪竟不拜命韓魏公語録云司馬君實初除樞密副使竟辭不受時公在魏聞之亟遣人齎書與文潞公勉之云主上倚重之厚庶幾行道道或不行然後去之可也似不須堅讓潞公以書呈君實君實云自古被這般官爵引得壊了名節為不少矣先忠肅公纔除御史歸語家人曰趣装毋為安居計未及陛對首上疏論亳州獄起不正小臣意在傾故相富弼以市進繼上疏極論新法不便遂貶衡州胡衡麓曰身體髮膚生而有之也志士仁人猶不求生以害仁況官爵非生而有之者乎范忠宣公謂人做好官職當如奉使借館便自無事胡文定公謂浮世利名蠛蠓耳何足道哉列子曰蠛蠓生汚壤之上因雨而生睹陽而死上莫結反下莫孔反江公望有云爵禄者止能砥礪頑鈍之人不能榮寵輕富貴安貧賤有道之士古人去就豈為爵禄而已亦人君所宜知也韓魏公有云富貴易得名節難保又云處去就之難者不可猛而有跡即孔子欲以微罪行之義或問於伊川為官僚而論事於其長理直而不見從則如之何伊川曰亦權其輕重而已事重於去則當去事輕於去則當止事大於爭所當爭事小於爭則當已此皆論事去就之法也前輩有云事有當死不死其詬有甚於死者後亦未必免死當去不去其禍有甚於去者後亦未必得安世人至此多惑亂失常皆不知輕重義命之分也此理非平居熟講臨事必不能自立不可不豫思古之人欲委質事人其父兄日夜先以此教之中材以下豈臨事一朝一夕所能至哉教之有素其心安焉所謂有所養也或云吕正獻公家訓今也不然内則父兄外則師友誘掖訓誨而不以全軀患失為言者幾希後人氣節少及前輩者良有以也大抵得失之心重者勢決不能有所立前輩欲嚴於出處雖飲食起居之際必致意焉范文正公每仕京師早晚二膳自已至婢妾皆治於家徃徃鐫削過為簡儉有不飽者雖晚登政府亦然補外則付之外厨加料幾倍無不厭飫或問其故曰人進退雖在已然亦未有不累於妻孥者吾欲使居中則勞且不足在外則逸而有餘故處吾左右者朝夕所言必以外為樂而無顧戀京師之意於吾亦一佐也杜祁公食於家惟一麪一飯而已或美其儉曰衍本一措大耳名位爵禄冠冕服用皆國家俸入之餘以給親族之貧者常恐浮食焉敢以自奉也一旦名位爵禄國家奪之卻為一措大又将何以自奉養耶胡文定公曰人須是於一切世味淡薄方好不要有富貴相王介甫在政事堂只喫魚羮飯因薦兩人不行下殿便乞去云世間何處無魚羮飯為它累輕便去住自在孟子謂堂髙數仞食前方丈侍妾數百人我得志不為也學者先須除去此等常自激昻便不到得墜墮先忠肅公手記云予初登第過濮州兵部郎中士公名建中字熙道學行載石徂徠集中倅郡公事東州大儒也子見之甚從容士公曰汶上有何生事對曰無有士公曰不可君有兒女當思所以養之君今得科第官則有事事則有法官守豈可以常保一不以理去亦復狼狽矣又有大者常見仕者既老而眷眷於禄當去不去或當官見義不敢為以避禍患自中人已下則然豈人情皆願悦詬恥哉多出於退無地也使回顧有所歸無妻孥寒餓之累其心當綽綽焉進退輕矣進退無所累則臨大利害必有可觀者如君固不可量然此不可不知予初得第方就仕思其言不入也其後閲世故見其言至為可信知前輩思慮深議論有根本也杜祁公告賈直孺初登第之語大意亦同邵康節云處失在得之先則得亦不喜處得在失之先則失難處矣皆先哲用力之方今故具載之也案此篇錯誤甚多獻公家訓四字錯入大字内倅郡倅字誤入小註内今也不然一段誤接士公下衍本一措大一段誤接有所養也下今推尋文義俱為改正辭順理直者論事之本子曰賜也亦有惡乎曰惡訐以為直者案此下原註明道之意四字有缺文伊川曰自古能諫於君者未有不因其所明者易太子是其蔽也四皓者髙祖素知其賢而重之此其不蔽之明也故因其所明而及其事則悟之如反手又云事君須體納約自牖之意人君有過以理開諭之既不肯聽當救正於此終不能回卻須求人君開明處如漢髙祖欲廢太子叔孫通言嫡庶根本彼皆知之既不肯聽矣縱使能言無以易此惟張良知四皓素為髙祖所敬招之使事太子髙祖知人心歸太子乃無廢立意伊川易傳取之者善其智而能諫以明納約之意温公通鑑去之者為後世慮逺矣去取之意則初不相悖也學者又當黙識楊龜山曰君子之事君其説不可惟利之從茍惟利之從則人君所見者利而已彼有軋吾謀者其説又利於我吾説必見屈矣故不若談道理道理既明人自不能勝也竊觀前輩論事或以道理或以利害無所必者察主識之奚若審事勢之如何而必以悟上之義也胡衡麓論幾諫直諫之義亦然劉元城曰人臣進言於君度其能為即言之若太迫蹙關閉或一旦決裂其禍必大不若平日雍容以諷之使無太甚可也先忠肅公奏議曰嘗以謂欲言政府之事者譬如治湍暴之水可以循理而漸導之不可以隄防激鬬而發其怒不惟難以成功亦為患滋大故臣自就職以來竊慕君子之中道以其言直而不違於理辭順而不屈其志不敢悻然如淺丈夫以一言一事輕決去就致聖朝數逐去言事者而無所禆補思以上全國體而下亦庶幾能久其職業而成功名韓魏公曰善諫者無諷也無顯也主於諷者必優柔微婉廣引譬諭冀吾説之可行而不知事不明辨則忽而不聽也主於顯者必暴揚激訐恐以危亡謂吾言之能動而不知論或過當則怒而不信也茍不以理勝為主難矣哉惟言之重非面折廷爭之難葢知體得宜為難當顧體酌冝主於理勝而以至誠将之若知時之不可行而徒為髙論以賣直取名罪不容誅矣敢言之患多失在此劉元城謂人臣之事君也既自知己之所為又須知君之所能若不知而直前未有不受禍敗也范太史謂君不知其臣臣不量其君而欲成天下之務未之閒也即禮云事君量而后入之義張敬夫云責難陳善非在己者先盡其道而能之乎在已有未至而獨以望於君難矣此亦推廣孟氏以正己為先之説詳責難之義葢勉其君行先王之道而已非止以事功言也若夫智小責之以謀大力小責之以任重可乎彼齊宣王欲以一服八固孟子之所深闢也公在政府人有自陳不中理者從容諭以不可之理而已未嘗峻折之也明道謂凡為人言者理勝則事明氣忿則招怫嘗赴朝堂議事荆公厲色以待明道徐曰天下之事非一家之私議願公平氣以聽竊謂論事要亦當如是也韓魏公别録慶厯中范文正公同在西府上前爭事議論各異及下殿各不失和氣如未嘗爭葢其心主於事可行而已不為己也案議論下本係缺文今據宋史補入或問人於議論多欲直己無含容之氣是氣不平否伊川曰固是氣不平亦是量狹人量隨識長亦有人識髙而量不長者是識實未至也吕居仁云當官之法直道為先其有未可一向直前或直前反敗大事須用吕惠穆公稱停之法此非特小官然也為天下國家亦當知之又如監司郡守嚴刻過當者須平心定氣與之委曲詳盡使之相從而後已如未肯從再當如此詳之其不聽者少矣吕惠穆公每事之來必稱停輕重令得所而後已事經公處者人情事理無不允當劉元城極言稱停二字最吾輩當今所冝致力不可不詳熟思講也時者出處語黙之本君子之道或出或處或黙或語要在不失其時是乃時止則止時行則行時然後言之義也時也者當其可而已矣其可仕也孔子有見行可之仕趙岐云季桓子秉魯之政孔子仕魯冀可得因而行道也有際可之仕際接也衛靈公遇孔子以禮故亦仕之子曰天下有道丘不與易也言天下有道則無事於變易故避世長徃之士聖人有所不取而三月無君則皇皇如也其可去也齊景公欲待孔子以季孟之間曰吾老矣不能用也孔子行齊歸女樂季桓子受之三日不朝孔子行衛靈公與孔子游仰視蜚鴈意不在孔子孔子行而未嘗有三年淹於一國故孟子曰可以仕則仕可以止則止可以久則久可以速則速孔子也孔子聖之時者也邵康節謂孟子得易之用伊川謂得易之用者莫如孟子又謂由孟子可以得易於此可以黙識矣伊川曰易者變易也隨時變易以從道也濓溪曰可止可仕古人無所必束髮為學将有以設施可澤於斯人者必不得已止未晚也劉元城曰仕宦豈是不好事但㸔行已如何耳若仕宦有益於社稷生靈其勝獨善一身多矣孟子謂仕非為貧也而有時乎為貧横渠釋簡兮之詩曰簡畧也無所難也甚則不恭焉賢者仕禄非迫於饑寒不恭莫甚焉簡兮雖刺時君不用然為仕者不能無太簡之譏胡衡麓謂君子陽陽乃有樂只之諷非純以為當然也為貧者辭尊居卑辭富居貧張横渠曰士君子仕宦為貧則當居米鹽筦庫之職以無媿於心為道則當堯舜君民太平一世可也曷可妄據卿相之位乎惡乎冝乎抱關擊柝監門職也孔子嘗為委吏矣曰㑹計當而已矣主委積倉庚之吏也嘗為乗田矣曰牛羊茁壯長而已矣苑囿之吏掌六畜之芻牧者或問聖人為貧而仕者否伊川曰孔子為乗田委吏是也因言近時有人以此相勉某答云待饑餓不能出門戸時當别相度古之人未嘗不欲仕也惡不由其道爾伊川曰古好貧賤而惡富貴是反人情也所以異於人者以安義命焉爾蘇老泉有云凡士之不近人情者鮮不為大姦慝豎刁易牙開方是也又可以此觀人矣老泉名洵字明允自號老泉歐陽文忠公謂其學究六經百家之説以考質古今治亂成敗聖賢窮達出處之際得其精粹涵蓄充溢下筆頃刻數千言其縱横上下出入馳驟必造於深微而後止來京師一時後生學者皆尊其賢學其文以為師法張文定公云僕領益郡得先生所著權書衡論以書先之於歐陽永叔一見大稱歎目為荀卿子獻其書於朝自是名動天下士爭傳誦其文時文為之一變韓魏公嘗與論天下事亦以為賈誼不能過也治平三年卒今西蜀文學之盛自先生父子倡之世謂之蜀學語黙以時者何子曰可與言而不與言失人不可與言而與之言失言韓退之云汝非其師不請而教誰云不欺蘇東坡云未信而諫聖人不與交淺言深君子所戒孟子謂位卑而言髙罪也楊龜山言黙戒云未可言而言與可言而不言皆足以取禍温公曰鐘鼓叩之然後鳴人不以為異若不叩自鳴人孰不謂妖耶不可以言而言猶不叩自鳴也可以言而不言猶叩之而不鳴也亦為廢鐘鼓矣胡衡麓曰不在其位而謀其政猶司馬而論司冦得失是侵官也王沂公自登朝厯掖垣内署每謂王文正公必語及闕政公辭以不在其位不敢預聞及當可言之位論事侃侃然案此下原本有衆皆二字及楊龜山論侵官數句缺文既去而未去所掌是犯分也東坡守維揚某以書諫曰君子之於事以為居位而不言則不可去位而言則又不可其言之者義也其不可言者亦義也前為潁川言之可也今為揚守而預潁事其亦可乎豈亦嘗言之而不置耶此取勝之道也苟不公言而私請之又不如己也天下之事行之不中理使人不平者豈此一事豈能盡爭之耶爭之豈能盡如人意耶徒使呫呫者以為多事爾下案此注東坡守維揚句有缺文未用而論任用之事是干進也楊龜山云古之君子自重其身常若不得已而後進賈誼身非宰相而汲汲自進其説葢亦不自重矣在我者不重故人聽之也輕出為王傅其論國事猶曰陛下曽不與如臣者議之則是欲嬰撫在庭之臣而出其上也豈不召禍歟既不在其位乃不待問而告焉非有利心欲間人以昌己者不為也又曰既在其位當朝夕以思見美必順見惡必强見賢必薦見不肖必逐見治理必具見亂萌必除隨職而舉乃又不能惟拱手黙黙聽它人所為或不敢不為上奏如孔光或恭遜取媚如胡廣或斂袵無所可否如關播或書名給唯諾如陳希烈而國家休戚己不與知皆不忠之大者又云范太史謂君子立人之朝有官守者不失其職有言責者不隠其言君從之亦諫君不從亦諫諫而不入則去之臣之義也其懐禄畏罪而不言則曰君不能從此孟子所謂賊其君者也昔温公在從列力言新法不報㑹除副樞公雖懇辭猶論不已奏曰臣若已受樞密副使之告即不敢更言職外之事今未拜命猶是侍從之臣於朝廷闕失無所不可言者韓魏公罷相判永興軍入辭時二府方議邉事未決乞召公同議既對即奏曰臣前日備員政府自當參議今日藩臣唯奉行朝廷命令耳決不敢預聞遂罷議新法初下公判大名府曰某老臣也義不敢黙及不聽曉官屬亟奉行曰某一郡守也其敢不如令横渠謂范巽之曰在朝則持國論居外則奉詔令初行新法仕宦四方者皆欲投劾而歸或有以書問邵康節答曰正賢者所當盡力之時新法固嚴能寛一分則民受一分之賜矣投劾而去何益歐陽文忠公為河北都漕陛辭上面諭有所欲言言之公曰諫官得風聞言事外官越職為言罪也胡文定公在後省繳駁吏部侍郎馮澥論劉珏疏云侍從臣寮雖當獻納至於彈擊官邪必歸風憲各有分守不可侵紊夫庖人雖不治庖尸祝不越尊俎而代之而澥遽越職此路一開臣恐立於朝廷者各以好惡爭相攻擊脅持傾陷滋長怨讎非所以靖朝綱明分守又因蘇昞上書有曰張横渠聲動關中蘇季明從之最久以其文釐為十七篇自謂最知大㫖及後來坐上書邪黨卻是未知横渠昔横渠有詩云葵藿野心雖萬里不無忠戀向清朝夫豈不欲道行於世在館半年即去後十年復召之不半年又去只為道不合也季明越職上書得罪甚重必亦有非所宜言者矣文定公之論以戒乎位卑言髙思出其位者而人君求賢之路則不可不廣也温公奏疏云上古諌爭無官自公卿大夫至於庶人百工商旅矇瞍芻蕘無有不得言者以達下情而察國政也若署官而守之非其官者皆不得言則下情壅而不通如是則國家雖有迫切之憂行道之人皆知之而在上者莫得閒此其為害不亦深乎唐明皇出奔不四十里而已無食有父老郭從謹進言曰先王務延訪忠良以廣聰明宋璟為相數進直言天下賴之而安頃來廷臣以言為諱闕門之外陛下皆不得知草野之臣知有今日久矣但九重嚴邃無路上達事不至此則何由得睹陛下之面而訴之乎上曰此朕不明悔之無及慰而遣之君天下者可不監哉或問楊龜山以匹夫一日而見天子天子問焉盡所懐而陳之則必有窒礙者量不盡則為不忠如何曰事亦須量深淺孔子曰信而後諫未信則以為謗己也易之恒曰浚恒凶此恒之物也故當以漸而不可浚浚則凶矣假如問人臣之忠邪其親信者誰歟遽與之辨别是非則有失身之悔君子於此但不可以忠為邪以邪為忠語言之間固不無委曲也至於論理則不然如梁惠王問孟子何以利吾國則當言何必曰利齊宣王問卿不同則當以正對葢不直則道不見故也或問胡衡麓陳成子弑簡公孔子去位猶告於哀公請討之何也衡麓曰列國大夫聞國大政於君君臣臣之義豈為去位而可廢也故孔子雖已告老至於鄰有弑逆天下大變人理所不容則執之者無罪殺之者無禁況從大夫之後乎又曰道有常變言非一端茍不知聖神無方之傳是膠柱而調瑟也靖康改元邊事大起楊龜山奏疏云陛下即位之初國家多事之際凡在臣子苟有見開咸冝自竭葢明是理者也明道有云若合開口時如荆軻樊於期要它頭也須開口此皆聖賢出處語黙之模轍也義者辭受取予之本中庸謂義者冝也古之人辭受取予初無定體止㸔義之所在故孟子有可以取可以無取可以予可以無予之訓伊川曰朋友之饋是可取也然已自可足是不可取也纔取之便傷亷也可以予然卻以不予若予之時財或不贍卻於合當予者無可予之此所以傷惠子華使於齊冉子為其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉一釡容六斗四升一庾容十六斗一秉為十有六斛五秉八十斛也子曰赤之適齊也乗肥馬衣輕裘吾聞之也君子周急不繼富原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎知此則可以與可以無與之義得矣温公答劉䝉丐錢書畧曰足下以親之無以養兄之無以葬弟妹嫂姪之無以恤策馬裁書千里渡河指某以為歸且曰以鬻一下婢之資五十萬畀之足以周事何足下不相知之深也某居京師已十年囊儲舊物皆竭安所取五十萬以佐從者之蔬糲乎夫君子雖樂施予亦必已有餘然後能及之人就其有餘亦當先親而後疏先舊而後新某得侍足下纔周歲得見不過四三而遽以五十萬奉之其餘親戚故舊不可勝數将何以待之乎家居食不敢常以肉衣不敢純以帛何敢以五十萬市一婢乎足下又欲使某取之於它人是尤不可之大者微生髙乞醯於鄰人以應求者孔子以為不直況已不能施而欲乞於人以為己惠豈不害於恕乎孟子於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受兼金好金也價倍於常者二十兩為鎰而陳臻謂前日之不受是則今日之受非也今日之受是則前日之不受非也孟子以為皆是也當在宋也予将有逺行行者必以贐辭曰餽贐予何為不受當在薛也予有戒心辭曰聞戒故為兵餽之予何為不受趙岐云時孟子有戒備不虞之事若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎謂以貨財取我欲使我懐惠也知此則可以取可以無取之義得矣昔魯國之法贖人於諸侯者皆取金于府子貢贖人辭而不取孔子聞之曰賜失之矣今魯國富者寡而貧者衆贖人受金則為不廉其何以相贖乎自今以後魯人不復贖於諸侯矣或有義不當受而衆受之則如之何文中子謂同不害正異不傷物内不失真外不殊俗劉元城謂無為皦皦之迹以致怨忌斯言盡之矣尹和靖嘗書通語於座右云昔杜祁公嘗謂門生曰作官第一清畏無求人知苟欲人知同列不慎者衆必将譖己為上者又不加明察適足取禍耳但優游於其間黙而行之無媿於心可也元城又謂唐充之為善欲人之見知故不免自異以致禍患非明哲保身之謂張横渠語學者云持守廉潔此士大夫之常事其上更有事在葢恐人矜已自滿也楊龜山曰君子於辭受取予之際茍非其義一介不以與諸人茍以其道舜受堯之天下不以為泰而士或以嗇與為吝以寡取為廉者皆不知此也知止者保身之本易曰亢龍有悔亢之為言也知進而不知退知存而不知亡知得而不知喪朱漢上曰亢者處極而不知反者也萬物之理進必有退存必有亡得必有喪亢知一而不知二故道窮而致災荀子曰物禁太盛言物極則衰理之常也蘇黄門云日中則移月滿則虧四時之運成功者去天地尚然況於人乎陳希夷名摶字圗南亳州真源人賜號希夷先生門人种放叙其學明皇王帝覇之道太宗嘗問在昔堯舜之為天下今可致否對曰堯舜土階三尺茅茨不翦其跡似不可及然能以清靜為治即今之堯舜也云優好之所勿久戀得志之處勿再徃昔人有云翠鵠犀象其處世非不逺死也而所以死者惑於餌也蘇秦智伯之智非不足以避辱逺死也而所以死者惑於貪利不止也胡文定公語楊訓曰人家切不要事足意得常有些不足處便好人家纔事足意得便有不恰好事出亦體消長之理言也又謂种明逸放字曰名者古今之美器造物者深忌之天地間無完名子名将起必有物敗可戒之後果然邵康節詩云大得卻須防大失多憂元只為多求又云既有非常樂須防不測憂昔范蠡滅吳報會稽之恥句踐以霸蠡謂成功之下不可久處大名之下難以久居遂乗舟浮海而不返張良報讎强秦天下震動後為帝者師良謂此布衣之極願棄人間事欲從赤松子游至學導引辟穀而不食疏廣謂受曰知足不辱知止不殆功遂身退天之道也今宦成名立如此不去懼有後悔即日父子俱移病去皆達是理也竊謂平時叨居其位以苟富貴危亂将至則奉身而退盜取知止之名得乎吕伯恭云保身乃己事豈為治亂而増損哉身體髮膚受之父母不敢毁傷本非末節也至於偷生徇私養小失大如是而全身逺害則君子賤之耳楊龜山曰髙皇帝既平天下於功臣尤多忌刻蕭何為宰輔至出私財以助軍費買田宅以自汚僅能免死甚至械繫之猶不知引去豈工於為天下而拙於謀身耶暗於功成身退之義貪冒榮寵惴惴焉如持重寳惟恐一跌然而幾踣者亦屢矣以何之賢而猶不免是惜夫杜正獻公謂君臣間能全始終難石林葉少藴謂白樂天與楊虞卿為姻家而不累於虞卿與元稹牛僧孺厚善而不黨於元稹僧孺為裴晉公所愛重而不因晉公以進李文饒素所不樂而不為文饒所深害推其所由惟不汲汲於進取其志在於退是以能安於去就愛憎之際每裕然有餘也漢上又曰人固有知進退存亡者矣其道詭於聖人則未必得其正與天地不相似又曰聖人知進退存亡不失其正則德合隂陽與天地同流而無不通矣安義命者處困之本富貴貧賤死生禍福得失毁譽孟子謂莫之為而為者天也莫之致而至者命也吾儒則以非人之所能為而為者然後歸之天非人力所致而至者然後歸之命此與術家占算之説不同豈容智力可以僥求倖免哉胡衡麓謂不知命者輒尚智力君子處困或待我以横逆或為人所輕侮之類皆處困也當思其所致之由孟子所謂必自反也則動心忍性増益其所不能范太史謂凡人處憂患則發其智遇窮困則激其心古之聖賢以此成其德行所以邵康節詩有珍重至人嘗有語落便宜是得便宜之句此陳希夷語也胡文定公進中興策云聖賢不畏艱難齊桓晉文霸心生於莒狄楚人敗於柏舉昭王奔随舟師敗於終纍陵師敗於繁陽楚國大惕而令尹子西顧曰乃今可為矣於是遷郢於鄀改紀其政楚遂以安舜發於深山文王興於羑里聖人作易於困卦則曰困亨者困窮而致亨也於震卦則曰震亨者因震恐而致亨也聖賢所以不畏艱難者以此伊川曰君子當困窮之時盡其防慮之道而不能免則命也如孔子遭桓魋将要而殺之微服過宋之時又以見聖人道並行而不相悖處也當推致其命以遂其志知命之當然也則窮塞禍患不以動其心行吾義而已茍不知命則恐懼於險難隕穫於窮厄所守亡矣又曰君子處難守正不知其它也守正而難不解則命也遇難而自放邪濫雖使茍免亦惡德也知義者不為又云賢者惟知義而命己在其中中人已下方以命處義又曰處屯難而有致亨之道其惟貞固乎然能守正不變者鮮矣人之於患難只有一箇處置盡人謀之後卻須泰然處之有人遇一事則心心念念不肯舍畢竟何益若不會處置了放下便是無義無命也蘇東坡曰人不知命者常求其所不可得避其所不可免公謫嶺外與程正甫書云覩近事已絶北歸之望然甚安之譬如元是惠州秀才累舉不第有何不可又與參寥書云瘴癘病人北方何嘗不病是病皆死得人何必瘴氣京師國醫手裏死人尤多鄒忠公元符間論事謫嶺外與故人田名晝承君泣别承君曰使志完隠黙官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉忠公歎息曰君子贈我厚矣昔劉元城紹聖中竄嶺外一日所厚來垂涕言曰屬聞朝廷遣使入郡将不利於公請早自裁無辱公從容告之曰知君至情而某罪大謫輕若朝廷不貸甘心東市之誅使國家明正典刑誅一而勸百助時政之萬一安世之志也何至效匹夫匹婦自經於溝瀆哉卒不為動胡衡麓曰凡人履險蹈難徃徃詭計以茍免徼倖以圗全必曰命若是也其可逃乎當是時處之在我矣若陳蔡之際匡人之厄縲紲之中孔父仇牧荀息之事一有遷心變志終不能與命相違徒為不義士所以見危必當自致其命也又曰其然也不能使之不然其不然也不能使之必然其未然也則不可力變其然夫是之謂天命葢不易之理得其所以然之理則我為主矣又曰元聖必得其位至仲尼則窮為旅人大德必得其壽至顔回則三十而夭舜能孝親而不能必瞽之不杖己也能友弟而不能必象之不将殺己也湯文聖矣而不能免夏臺羑里之厄比干箕子忠矣而不能免剖心囚奴之禍孔子豈嘗有憾於武叔而當朝肆毁豈嘗失色於桓魋而縱兵為冦凡如是類聖人猶不免惟盡其在我者爾邵康節謂聖人不能使人無謗能處謗者也有詩云受疑始見周公旦經厄方明孔仲尼又詩云禍如許免人皆諂福若待求天可量又云繫自我者可以力行繫自人者難以力爭又云聖智不能無蹇剝賢才方善處哀榮皆至言也謝上蔡謂信得命便飬得氣不折挫胡文定曰謝顯道少年便信命嘗見伊川伊川問徃京師應舉否答以不願去親庭止就上蔡伊川喜之伊川有云人多説某不教人習舉業而望及第是責天理而不修人事但舉業既可以及第即已若便去上面盡力求必得之道是惑也邵伯温失解康節示之詩云干求須黽勉得失是尋常外物不可必其言味甚長劉元城曰應舉須是文章及第不由事業大要謂得之不得有命不當以得喪之念累于心故伊川舉進士廷試報罷遂不復試孫泰山三黜於禮部則退休焉唐李泌曰天命它人皆可以言之惟君相不可言葢君相所以造命也若言則禮樂刑政皆無所用矣紂曰我生不有命在天此商之所以亡也劉元城曰聖人有所謂知命有所謂言命但聖人知而不言若知而言之是教天下後世不修人事一本於命其禍有不可勝言者矣孫泰山謂善為國者先人事而後天意梁況之云不信己之所為而歸之天意不可也梁師事孫泰山門人姜潛至之伊川亦曰聖賢於亂世雖知道之将廢不忍坐視而不救也必區區致力未極之間强此之衰艱彼之進圗其暫安兾其引久茍得為之孔孟之所屑為也王允之於漢謝安之於晉亦庶矣又云國祚長短自有命斁人君何用汲汲求治禹稷過門不入非不知饑溺而死者自有命又卻救之如此其急須思量到道並行而不相悖處可也又曰賢不肖之在人治亂之在國不可歸之命關子明曰象生有定數吉凶有前期變而能通則治亂有可易之理又須知此義也自立志至安義命凡十一條皆莅事行已之要此其大畧也天下之事殊塗而同歸在乎以類推之今逐條所舉亦綱領而已因紀聖賢言行於逐條之下明非愚敢臆説也若諸儒之論意義同而載者似重複姑以見所造或有淺深其趨未始不同或疑條端多而叙載繁者要在深考此書之意後學尊其所聞是也過之者稍異乎師説則互相詆誚幾成黨與甚至毁訾先哲識者有憂之胡文定公語徐時動云學道先除去人我敬之不加喜侮之不加怒山谷云好學之士常患人我之念最難調伏其流葢自熙豐而來范忠宣公論王荆公止因喜同惡異遂至黒白不分蘇東坡謂介甫之文未必不善也患於好使人同己自孔子不能使人同王氏安能以其學同天下胡衡麓謂當時學士大夫意向稍殊乎王氏則擯斥隨之必如是説始堪仕進百唱千和率天下出一私户不亦甚乎竊謂學者亦可以監矣謝上蔡洛學也論語解中如臨川諸説一言之善亦不廢而取之豈有意欲救其弊歟噫聖人何常師之有三人行必有我師焉主善而已宜乎氣象之廣大也胡衡麓謂吾夫子樂取諸人以為善博學而無常師於老􅅨則問以禮於郯子則問以官名於師襄則問以琴於之宋則得坤乾於之杞則得夏時於南人則善巫醫之言於西方則録車甲之矜凡人寸長片善靡不資焉則何事之不知何理之不明何道之不得固天縱之将聖又多學而無常師所以集大成也邵康節既受學於李挺之又游淮海之濱涉於濟汶達於梁宋茍有達者必諮訪以道無常師焉康節謂學者之患在於好惡先成乎心而挾其私智以求於道則蔽於所好而不得其真故求至於四方萬里之逺天地隂陽屈伸消長之變無所不考而必折衷於聖人已上見先生行状諡議揚子雲謂衆言淆亂則折諸聖在則人亡則書苟折衷於一家之説未能無偏此未學之弊也汪聖錫謂世之學者徃徃假聖人之説以廣已造大曰我能通天下之志我能成天下之務我能不疾而速不行而至髙自標置欺眩愚俗若是者非特穿窬之盜而已又或守前人章句訓詁之傳雖隠之於心而或疑槩之以聖人之道而或不合不敢有加焉曰吾師之説則然二者之説固有差矣其於非其所自得則均也汪公受學於張横浦伊川每見人言前輩之短則曰汝輩且取它長處是皆一道也王述有云人非堯舜何得每事盡善胡衡麓論子貢貨殖云凡聖門諸子皆不可以一言之差一行之過斷其終身竊謂後進於先哲亦當然楊龜山語吕居仁云夫學者以孔孟為師學而不求孔孟之言抑末矣諸儒語録皆及門之士雜記一時之言惜乎不一經老先生訂正葢其中有早年暮年之説有告初學成德之語而初無倫次或因事感發有所指之言或随人氣稟有扶偏之訓而間闕本末或論隂陽變化性命之理或辯釋老幽明死生之説錯綜其間初學未有所主而驟觀之多失其下學之序未免為坐談之資苟非明師親友有以正之烏能免其弊哉昔伊川嘗戒學者勿編集語録云聽得轉動或脱亡一兩字便大别又語其門人尹和靖曰若不得於某之心所記者徒彼意耳和靖曰伊川平生用意惟在易傳求先生之學者觀此足矣語録之類出於學者所記所見有淺深則所記有工拙葢未能無失也龜山祭游定夫文亦云嗟吾先生微言未泯而學者所記多失其真胡文定公屢請龜山是正程子語録終不開下筆文定公亦卒莫敢措一辭二先生尚難之後學欲輕議可乎或有取語録以釋經者嘗疑以問汪公聖錫但舉和靖語以見答因附記於此若夫統論道之大本曰中而已子曰誰能出不由戸何莫由斯道也邵康節曰道無聲無形不可得而見故假道路之道而為名人之有行必由乎道謝上蔡辯老子先道而後德之説云自然不可易底便喚做道體在我身上便喚做德有知覺識痛癢便喚做仁運用處皆當便喚做義大都只是一事又曰道之得名以其人由之而不可離也近在父子夫婦之間視聽食息之際果可以離人乎自二端起或搥提仁義或絶滅倫類然後人始疑道為虚無寂寞矣濓溪曰天以陽生萬物生仁也伊川曰惻隠之心人之生道也竊謂言仁親切莫如二先生始悟先儒或以愛以元以寛以公恕以知覺言仁者亦生之屬也戕賊天性暴殄天物則為不仁矣醫家目草木實之穰曰仁以其有生道焉楊龜山謂論語言仁皆仁之方也伊川曰中即道也中之為義自無過不及而立名又曰喜怒哀樂未發謂之中言寂然不動者也吕與叔謂情之未動元無過不及又曰後世稱善治天下者無出乎堯舜禹豈執中而用之無不中節乎無過無不及民有不知世有不治者乎聖人之治天下猶不越乎執中則治身之要舍是可乎自中而發無不中節莫非順性命之理而已胡衡麓謂情不違理者性之正楊龜山謂堯咨舜舜命禹三聖相授惟執中而已或問君子時中莫是隨時否伊川曰是也中字最難識須是黙識心通且試言一㕔則中央為中言一家則㕔中非中推此類可見矣且如初寒時則薄裘可矣盛寒則薄裘不可在盛寒而用初寒之裘非中也更如三過其門而不入在禹稷之世為中若居陋巷則不中矣居於陋巷在顔子之世為中若過門不入則非中矣龜山因取扇子以稱之曰以長短觀之則彼為中以輕重等之則此為中善用中者惟等其輕重無過不及而已張敬夫云論其統體中則一而已分而萬殊而萬殊之中各有中焉朱元晦謂中無定體随時而在惟可與權者知之葢皆推廣上説也劉元城曰處事須權輕重務合道理毋使偏重是之謂中吕氏又曰小人見君子之時中惟變所適而不知當其可也而欲肆其姦心濟其私欲或言不必信行不必果則曰惟義所在而已然實未嘗知義所在猖狂妄行不謹先王之治以欺惑流俗此小人之亂德先王之必誅也胡衡麓曰道有常有變常止乎正變適於中變而不正斯亂矣范太史曰經者道之常君子治國平天下反其常道而已常道者堯舜之道仁義是也伊川云庸只是常乃定理也天下不易之理也是經也孟子只言反經中正其間横渠云學未至而好語變者必知其終有患葢變不可輕議若驟然語變則知操術已不正胡文定公曰君子守其常聖人盡其變又謂春秋變例非聖人莫能裁蘇東坡曰公山弗擾佛肸之召南子之見皆非常道惟孔子則可故曰聖達節謝上蔡論佛肸召子欲徃云聖人涉世如善游不避深淵使不善没者效之豈不殆乎因悟東學與温公之學語常而罕及變其㫖微矣子所雅言詩書執禮之意也或議温公學有未至處大槩指此類而言觀諸用又不然在仁宗朝極論國匱理財為急以為食貨國之大政宰相之職當領在神宗朝力爭富國興利為非以謂宰相當以道佐人主不當領制置三司條例謂公昧於時中可乎竊謂道無適而非中一有偏倚乖戾隨應萬物失其所由矣如四時之過不及則物災氣血之過不及則身病故人事之過不及則害生政事之過不及則亂作萬化萬事莫不皆然悉由乎不中節也伊川謂事事物物皆有自然之中朱漢上謂中乃自然之理非人能為之也學者又豈只訓釋一中字而止乎要須用而能中節斯可矣温公謂韓持國曰某所以不好佛老者正謂其不得中道借使有人真能心如死灰形如槁木及有物歘然來感之未免出應之則其喜怒哀樂未必皆能中節也中節者當其理而已非理明義精無人欲之私焉烏能至是哉胡衡麓曰中之難執也自堯舜禹儆戒以相授非至精至一窮極道心不足以得之而世儒多易其言唐楊嗣復所謂事貴得中者譬之盜跖欲殺十人而勸之曰盍殺五人可爾以是為中不亦悖乎伊川謂楊墨本學仁義但所學稍偏故其流遂至於無父無君可不審歟大抵修身齊家治國平天下未有偏倚而能立不和而能行者先大夫謂三百八十四爻其用不出乎時中劉絢問讀春秋以何道為準伊川曰其中庸乎楊龜山謂書五十九篇一言以蔽之曰中而已至哉中乎誠天下之大本也故繫之篇終焉常病初學從事於末而昧乎本鮮克有成作明本書諸座右以自警云本末初無二致明乎一貫之理尚何先後云哉然初學不先知其本則末必紊明本葢有不得已而作也非敢語成德而淑諸人姑以自訓遺之子孫若同志之士亦所不隠也吾子孫讀經史之外茍能翫味是書窮則以之修身達則以之從政庶逃乎虚誕之譏腐儒之誚矣若以類書觀之非予志也至於先儒接人之端學者進德之門治道為政之要涖事行己之方至王霸之别釋老之辨諸學之源末學之弊大畧粗見末學之弊昔胡文定公論程氏學疏今朱元晦中庸集解叙葢言其畧矣大槩驚髙逺事空妙喜同而惡異好名而尚言談體而遺用語變而厭常析學問政事為兩途離修身治國為二道殊非聖賢誨人之本㫖此風寖長其弊将有不可勝言者吾子孫勿襲其軌可也横渠謂以道學政術為二事此政自古之可憂者胡衡麓曰父子君臣之倫禮樂刑政之具以至取予之介交際之言加帚於箕之儀奉席如橋之習無非性與天道也謂此非性與天道則人所以行乎父子君臣禮樂刑政者是皆智巧偽設土苴粃糠之迹而性與天道茫昧杳冥無預乎人事此豈五經所載孔孟所教耶劉元城語馬永卿曰有暇可㸔條貫不獨可以治人亦可以保身余嘗以審於衡麓答云本朝憲章在仕者不知則為吏所欺矣雖條法先儒亦不令人廢者葢窮理之一事耳明道事迹云堯舜三代帝王之治所以博厚悠逺上下與天地同流者先生固以黙而識之至於興造禮樂制度文為下至行師用兵戰陣之法無所不講皆造其極外夷狄情状山川道路險易邊鄙方戍城寨斥堠控帶之要靡不究知其吏事操決文法簿書又皆精密詳練竊謂學者能師法焉庶可成通儒矣子註盡其詳者亦有不得已焉爾昔趙元考與温公論著述之體當以正文舉其要子註盡其詳又温公與范太史論長編云寜失於繁無失於略況是書将欲曉初學歟書中所紀聖賢言行悉以意義為序初無先後之别或有意義同而詳略異或意雖不屬而義難略者具載子註云明本釋卷下
