body:
  text: 明本釋卷上宋劉荀撰予觀論語記林放問禮之本孔子有大哉問之對有子論孝弟而有君子務本之言始知學者進徳修業必先明乎本夫事物莫不有本知其本則所由之戸不差循序而進然後徳業可得而成矣大學曰物有本末事有終始知所先後則近道矣言知其序而進則至於道近也伊川程先生名頤字正叔學者稱伊川先生與兄明道先生名顥字伯淳倡道學于洛中世謂之洛學此書所記謝良佐游酢楊時尹焞侯仲良朱光庭郭忠孝張繹劉安禮李籲劉絢皆門人也司馬温公吕申公薦先生力學好古安貧守節言必忠信動遵禮法實儒者之髙蹈聖世之逸民乞加召用胡文定謂孔孟之道不傳久矣自先生兄弟始發明之而後其道可學而至也于易則因理以明象而知體用之一源於春秋則見諸行事而知聖人之大用於諸經語孟則發其微㫖而知求仁之方入德之序其行已接物則忠誠動于州里其事親從兄則孝弟顯于家庭其辭受取舍非其道義則一介不以取與諸人以道學德行名於當世公卿大夫之所欽慕而師尊之又云紹興以來朝廷崇尚其學而志於利祿者託其説以自售傳者既失之而詖淫邪遁紛然淆亂莫能别其真偽河南之道幾絶矣見公文集云大觀元年卒曰人之學莫大於知本末始終故孝弟為仁之本事親事之本守身守之本國之本在家家之本在身河南尹和靖名焞字彦明靖康中誥授和靖處士曰學者必自本而徃姑推其類而舉其槩㑹于理則豈有二哉天下事物理雖一而分則殊莫不有本猶道一而已而得名之衆所主之不同也周濓溪云徳愛曰仁宜曰義理曰禮通曰智守曰信伊川云五常人誰不知是一箇道理既謂之五常安可混而為一也姑舉其關于大體切于日用者凡三十三條若云明於一本而萬本皆明似非始學者之事初學之患政在此吕與叔曰小學之學藝也行也大學之學道也德也禮樂射御書數藝也孝友睦婣任恤行也自致知至于修身徳也所以治天下國家道也古之教者學不躐等必由小學進於大學自學者言之不至于大學所止則不進自成德言之不盡乎小學之事則不成昔楊龜山與胡文定公書云性命一説雖揚雄猶未能造其藩况餘人乎而世人易言之多見其妄也孔子曰五十而知天命以孔子之聖猶待五十而後知則所知葢有未易言者非止如世儒之説也又曰知性而後可與言命中人以上乃可以與此故子罕言也明道令學者須守下學上達之語乃學之要張思叔請問或太髙伊川不答良久曰累髙必自下游定夫問隂陽不測之謂神伊川曰賢是疑了問是揀難底問謝顯道言天下何思何慮伊川云是則是有此理賢卻發得太早在明道與伊川受太極圗于濂溪卒未嘗以圗示人是知程門初不令學者躐等也濂溪曰聖希天賢希聖士希賢豈有弊哉武夷胡文定公名安國字康侯諡文定自云吾學麟經于伊川不及親見曰一以貫之知之至也非上智不與焉横渠張先生名載字子厚居鳳翔郿縣之横渠鎮學者稱横渠先生倡道學于關中世謂之關學此書所記吕大臨蘇昞范育皆其門人也吕正獻公薦其學術操守日益充實沈深有謀諳練世務誠國家之寳臣也吕與叔謂先生志道精思未始須㬰息亦未嘗須㬰忘學者有問多告以智禮成性變化氣質之道學必如聖人而後己先生氣質剛毅徳盛貌嚴然與人居久而日親其治家接物大要正己感人人未之信反躬自治不以語人雖有未喻安行而無悔故識與不識聞風而畏非其義也不敢以一毫及之先生乃二程中表也嘗告伊川曰它日道行見用須戒自處太重無以復來天下之善今日之患正在此爾或問横渠立言有迫切處否伊川云子厚謹嚴才謹嚴便有迫切氣象又云西銘之書推理以存義擴前聖所未發與孟子性善養氣之論同功明道云西銘横渠文之粹者也極純無雜秦漢學者所未到范育謂正䝉之書有六經之所未載聖人之所不言熈寜十年卒曰天下之事各各有理如何便道得了到極致則須是歸一其始極有分辨或問格物即窮理也詳見窮理條須物物格之還只格一物而萬理皆知否伊川云怎得便㑹通貫若只格一物便通衆理雖顔子亦不敢如此道又曰自修身可以至于盡性至命然其間有多少般數其所以至之之道當如何荀子曰始乎為士終乎為聖人今學者須讀書纔讀書便望為聖賢然中間至之之方便有多少又問孝弟為仁之本曰謂行仁自孝弟始明本葢竊取其義也然則所謂大本者何詳是書則一貫之理亦可以黙識矣伊川謂學者不知所以入德未見其能進也先儒誨人之方或曰敬或曰勤或曰禮或曰寡欲或曰不欺或曰忠恕之類此書具載者以見諸家設教不同其理則未始不貫是皆入徳之門難拘一説以畧之夫人氣稟不一要在因先儒之訓度己才而進焉尊所聞而行焉其至則一也伊川曰孔子之教人各因其才有以文學入者有以政事入者有以德行入者又以見聖門之廣大也明四端察五典者窮理之本大學以致知格物為先伊川曰知者吾之所固有然不致則不能得之而致知在格物胡衡麓曰致知然後知四端五典其致知格物之先務歟四端者何孟子曰惻隠之心仁之端羞惡之心義之端辭讓之心禮之端是非之心智之端今人乍見孺子將入於井皆有怵惕惻隠之心者其心豈自外來乃自然發見非思勉而得即所謂良心也秉􅂜也秉執也彝常也廣漢張敬夫謂本然之常性人皆均有故好是懿徳以其秉彝故也而不知好者是必有以亂其常故爾敬夫名栻受學于胡文定公季子宏仁仲天理也邵康節謂自然者天也又詩云自然之外更無天伊川曰天者自然之理也謝上蔡謂格物須識天理始得所謂天理者自然底道理孺子将入井乍見時其心怵惕所謂天理也要譽於鄉黨内交於孺子之父母惡其聲而然即人欲爾天理與人欲相對人欲纔肆天理滅矣明道令學者必先知仁其義一也謝子之説本諸樂記滅天理而窮人欲之義是知仁義禮智非人能强名皆我所固有其端常見於日用之間要在知皆擴而充之爾故孟子謂茍能充之足以保四海苟不充之不足以事父母充與不充在我而已吾儒則推此良心而達于天下以立萬世之大經釋氏則以死心為宗唯恐寂滅之不至儒釋之異天要在此彼三綱五常之道自然而廢也所以自謂出世間法爾然世間豈得而出哉張子韶少儀論曰釋氏乍脱人欲之營營其樂無涯遂認廓然無物者為極致是故以堯舜禹湯文武之功業為塵垢以父子君臣夫婦長幼為贅疣以天地日月春夏秋冬為夢幻離天人絶本末決内外㷀㷀無耦其視臣弑君子弑父兵革擾擾歲時荒歉皆門外事殆将滅五常絶三綱有孤髙之絶體無敷榮之大用此其所以得罪于聖人胡文定公曰人皆有是心堯舜能充爾如充惻隠之心至其仁如天充羞惡之心至以闕充辭讓之心至以天下讓充是非之心至以嗣子為嚚訟伊川曰桀跖不能無是以生但戕賊之以滅天爾問四端不及信何也伊川曰性中只有四端卻無信為不信故有信字今東者自東西者自西何用信字五典者何中庸謂父子君臣夫婦長幼朋友五者天下之達道孟子曰父子有親君臣有義夫婦有别長幼有序朋友有信伊川謂此為五典横渠以謂其生民之大經乎乃自然之定理豈人强能秩序哉即所謂彝倫也天叙也延平楊龜山名時字中立自號龜山云曰五品人之大倫天之性也不可須㬰離焉又曰五品之叙天也先王惇五典敷五教以迪之所以事天也自萬世當行之法言之謂之五典自設而為教言之謂之五教其實一也林少穎云葢天下之為天下惟是五者而已離此以為道非通道也行之天下人倫絶而天理滅矣聖人所以為聖亦豈有他哉人倫之至而已舜之憂民逸居而無教則近於禽獸使契為司徒不過教以人倫孟子曰學則三代共之皆所以明人倫也侯師聖曰君君臣臣父父子子先王之政達此以保天下謝上蔡曰不然人類幾何其不相噬齧也徂徠石先生名介字守道兖州奉符人師泰山孫明復躬耕徂徠山下學者稱徂徠先生世謂之東學杜祁公韓魏公力薦於朝歐陽文忠公謂先生篤學而志大雖在畎畝不忘天下之憂常以經術教授在太學葢以師道自居門人弟子從之者甚衆大學之興自先生始其言曰學者學為仁義惟忠能忘其身篤於自信乃可以力行也以是行于己亦以是教于人慶厯五年卒曰天下不可一日無君臣不可一日無父子不可一日無夫婦不可一日無朋友不可一日無長幼萬世可以常一日不可廢者孔子之道也周公所以示成王亦不過令知此道爾尹和靖曰伊川教人學先於君臣父子夫婦長幼朋友上求樂處便是因悟今之學者失所先後亦多矣胡文定公謂四端五典在人則一心也在物則一理也充四端可以成性惇五典可以盡倫性成而倫盡斯不二矣吕與叔名大臨藍田人謂四端之在我者人倫之在彼者皆吾性命之理伊川謂飲食男女之事喜怒哀樂之變皆性之自然釋氏必盡絶是然後得天真吾見其喪天真矣邵康節亦云釋氏棄君臣父子夫婦之道豈自然之理哉受乎天地之中立人之道不可須㬰離也邵康節語秦玠曰道滿天下何物不有之明道曰道之外無物物之外無道是天地之間無適而非道也即父子而父子在所親即君臣而君臣在所敬以至為夫婦為長幼為朋友無所爲而非道此道所以不可須臾離也又曰言天之自然者謂之天道言天之付與萬物者謂之天命康節云我性即天天即性横渠亦曰性即天龜山曰性天命也天理也道則性命之理而已伊川曰自性而行皆善也聖人因其善也則為仁義禮智信以名之以其施之之不同也故為五者以别之合而言之道也離而言之亦皆道也舍此而行是悖其性也是悖其道也而世人皆言性也道也與五者異其亦弗學歟其亦未體其性也歟其亦不知道之所存也歟吕與叔曰不明人倫則性命之㫖無所措不本性命則理義之文無所出孔子之言性與天道合天人兼本末妙道精義常存乎父子君臣夫婦朋友之間不逺乎交際酬酢洒埽應對之末非如異端之學絶倫離類造乎難行難知之域或問明道行状有盡性至命必本於孝弟之説伊川曰性命孝弟祇是一統底事彼後來人言性命者别作一般髙逺説故舉孝弟于人切近者言之又曰只説道便不是道也有道者之言只作尋常本分説了孟子言堯舜性之舜由仁義行豈不是尋常話至於易只道箇立人之道曰仁與義則性字也不消道自巳分明竊謂世之談虛説妙以為道學宜味斯言也昔嘗問學於胡衡麓名寅字明仲自號衡麓居士學者稱致堂先生文定公長子張横浦名九成字子韶杭州鹽官人受學於楊龜山謫南安學者稱横浦先生二侍郎莫不舉四端五典以示誨誠修身齊家治國平天下之大原致知格物之先務也故冠於篇首云横浦又云雖然有是四端而不知學問則行於所不當行故有不愛其親而愛他人者不惡小人而惡君子者有遜位於子之而召亂者有非君子而是小人者此所以不可不學也何謂學中庸所謂博學審問慎思明辨篤行伊川所謂五者廢其一則非學繹横浦之説本中庸修道謂教之義言非學不能品節之則親親仁民愛物之分差矣游定夫云為我至於無君兼愛至於無父則非教矣始悟聖人為六言六蔽之訓也窮理者進學之本大學謂致知在格物在字冝玩味先儒以謂格物即窮理也明道伊川兄也吕正獻公薦先生道術精奥頗能推行凡所臨莅皆有異績又舉充臺官云才行兼備忠義不羣伊川謂先生行巳内主於敬而行之以恕見善若出諸己不欲弗施於人為學知盡性至命必本於孝弟窮神知化由通於禮樂辨異端似是之非開百代未明之惑謂孟子没而聖學不傳以興起斯文為己任其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乗其還暗今之惑人也因其髙明闢之而後可以入道教人自致知至于知至誠意至于平天下灑埽應對至於窮理盡性循循有序病世之學者舍近而求逺處下而闚髙所以輕自大而卒無得也嘗曰吾學雖有所受至於體天理而言之則非得於人也又謂伊川曰異日能使人尊嚴師道者吾弟也若接引後學随人材而成就之則予不得讓焉朱公掞見先生於汝歸謂人曰光庭在春風中坐了一箇月劉安禮云從先生三十年未嘗見其忿厲之容謝顯道謂先生平和簡易坐則凝然不動如木偶人及其動容貌出辭氣則薫然粹和如春風之被萬物又云吾師先使學者致知以識别之而後持敬以涵養之所成就衆矣或問何先乎知識謝上蔡曰窮理之謂也夫黄金天下之寳也有未嘗識者人以鍮與之必以為金而不能辨矣不能辨則疑疑則安能定其所執乎既没太師文潞公合學者之議題其墓曰明道先生云元豐八年卒曰物即事也凡事上窮極其理則無不通新安朱元晦謂物者理之所在不即此而極之則事不該理理不該事而知有所不精故致知在格物格者極至之謂言即事即物而格至其理也伊川謂凡一物上有一理須是窮致其理窮理亦多端或讀書講明義理或論古今人物别其是非或應接事物而處其當皆窮理也又曰讀史須見聖賢所存治亂之機賢人君子出處進退便是格物又曰如火之所以熱水之所以寒至於父子君臣間皆是理又曰窮理非是盡要窮天下萬物之理且於一事上窮盡其他可以類推至於言孝則當求其所以為孝者如何若一事上窮不得且别窮一事或先其易者或先其難者各随人淺深譬如千蹊萬徑皆可以適國但一道入得便可只為萬物皆是一理又云随事觀理而天下之理得矣又云物不必謂事物然後謂之物也自一身之中至萬物之理理㑹得多相次案相次二字未詳疑相字衍文自然豁然有覺處又曰不致知格物而先欲意誠心正身修者未有能中於理者也謝上蔡曰學須先從理學盡人之理斯盡天之理學斯逺矣下學而上達其意如此竊謂宜於切日用處先致其力庻實得受用易以類推也胡文定公曰物物而察則智益明心益廣道可近矣又豈逐物而不自反哉又豈以己與物為二哉察於天行以自强也察於地勢以厚德也察於雲雷以經綸也察於山泉以果行也察於尺蠖明屈信也逺察諸物其略如此察於辭氣顔色尊徳性也察於灑埽應對兼本末也察於心性四辭養浩然之氣也四辭者詖淫邪遁也近察諸身其要如此伊川曰物我一理才明彼即曉此葢言合内外之道其理如此文定之論正為未明彼者設俾初學知用力之方亦近思之義爾若于理既明且曉則不待教之因物而反求也元城劉器之名安世師温公曰智足以窮萬物之理則事至而不惑釋氏以理為障而滅之此與吾儒之學不同也邵康節名雍字堯夫衛州共城人後居伊川師青社李之才其學自陳摶种放穆修來先生有云世人視穆伯長李挺之常人爾不謂有如此學問明道謂先生少時自雄其才忼慨有大志既學力慕髙逺謂先王之事為可必致及其學益老德益劭玩心髙明觀天地之運化隂陽之消長以達乎萬物之變然後頽然其順浩然其歸徳氣睟然望之可知其賢不事表暴不設防畛正而不諒通而不汚清明坦夷洞徹中外講學于家未嘗强以語人而就問者日衆鄉里化之逺近尊之其與人言必依於孝弟忠信樂道人之善而未嘗及其惡故賢者悦其徳不賢者服其化所以厚風俗成人材者先生之功多矣伊川謂先生胸懐放曠猶空中樓閣四通八達也臨終時只是諧謔須㬰而去以聖人觀之則亦未是比之常人甚懸絶矣将終語伊川曰面前路徑須常令寛路徑窄時自無著身況能使人行耶常言凡人為學失於自主張太過又云為治之道必通其變不可以膠柱猶春之時不可行冬之令也謝上蔡謂先生才氣豪邁在風塵時割據山河手也彼見天地進退隂陽消長萬物出入生死之理如指諸掌遂自安其所至下學之事不復致功兹其異乎人也其考事物之成敗始終人之禍福修夭無毫釐之差熙寜十年卒賜諡康節曰天下之物莫不有理窮之而後可知也又曰物理之學或有所不通不可强通强通則有我有我則失理而入於術矣言用知數揣度不欺者修徳之本大學曰誠其意者毋自欺也楊龜山曰王道本於誠意五霸假之者葢言其不以誠為之也伊川曰无妄之謂誠不欺其次矣又曰學以不欺暗室為始劉元城問誠致力之要温公令自不妄語始元城没身守之温公自云吾無過人者但平生所為未嘗有不可對人言者爾嘗問邵康節曰光何如人康節曰君實腳踏實地人也公深以為知言山陽徐節孝名積字仲車諡節孝嘗問安定胡先生名瑗字翼之海陵人學者稱安定先生主湖州學也世謂之湖學歐陽文忠公曰師道廢久矣自景祐明道已來學者有師惟先生暨孫明復石守道三人而先生之徒最盛其在湖州之學弟子去來常數百人各以其經轉相傳授其教學之法最備行之數年東南之士莫不以仁義禮樂為學慶厯四年始詔州縣立學於是建太學於京師下湖州取先生之法以為法至今為著令嘉祐四年卒范忠宣孫覺劉􅂜顧臨錢公輔徐積滕甫皆門人之達者也或人問見先生侍女否何以告之安定晩年蓄二姬一日延節孝食扵中堂見之胡曰莫安排由是有得嘗以告延平陳了翁名瓘字瑩中自號了翁云此某之悟門也劉元城曰古者君臣師弟子之間惟是誠實心中所欲言者即言之故冉求曰非不悦子之道力不足也子路曰有是哉子之迂也宰我欲短喪自謂期可已矣子曰食夫稻衣夫錦於汝安乎曰安且今有士人於此必不肯自謂學而力不足也必不肯面質其師之迂也必不肯自謂居喪而安於食稻衣錦也彼三人皆孔子髙弟而其言如此者以其出於至誠而已賈内翰名黯字直孺以状元及第歸范文正公誨之曰君不憂不顯惟不欺二字可以終身行之賈每語人曰此二字平生用之不盡也吕居仁曰當官處事但務著實如擦文書追改日月重易押字萬一敗露得罪反重亦非所以養誠心事君不欺之道也胡文定公謂吕安老曰執得定不欺君表裏如一此只是初學鎡基向上儘有階級地位未應指此為己至也邵康節詩云心可欺時天可欺又云天地之道直而已是知先賢立教莫不以不欺為本昔李潛君行其子欲貫開封戸籍取應君行曰汝䖍州人求事君而先欺君可乎寜遲緩數年不可行也鄭俠介夫中表有應舉不以實年者介夫戒之曰方謀入仕已有欺君之心不可前輩自閨門之訓己然劉元城曰天下詐偽之風甚矣以某從少至老觀之誠實之風幾乎一日衰於一日一年衰于一年方今夫婦父子兄弟之間猶相諂䛕也相欺詐也况於君臣朋友之間乎且君臣父子夫婦兄弟朋友只是一箇道理若一處壊即皆壊矣此風大可畏當其禍亂未作時猶一切含糊不見醜怪萬一有大禍亂則君臣之間無所不至矣又須避礙通於理明乎聖人不以證父攘羊為直而以君娶同姓為知禮則得之矣案原本此下有直言二字衍文寡欲者養心之本孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣濂溪周先生名惇頤字茂叔世家舂陵濂溪後居廬山學者稱濂溪先生洛中二程師也吕正獻公薦其操行清修才術通敏凡所臨莅皆有治聲趙清獻公亦累薦於朝黄魯直云茂叔人品極髙胸中灑落如光風霽月好讀書雅意林壑初不為人窘束世故權輿仕籍不卑小官職思其憂其為使者進退官吏得罪者賴以不寃然短於取名而急於求志薄於徼福而厚於得民菲於奉身而燕及惸獨陋於希世而尚友千古趙閲道贈詩曰心似冰輪浸玉淵節如金井冽寒泉東坡濓溪詩云先生本全徳廉退乃一隅因抛彭澤米偶似西山夫遂即世所知以為溪之呼先生豈我輩造物乃其徒東坡敬仰濂溪至矣而與伊川則終身不相知也熙寜六年卒曰養心不止於寡欲而存耳寡焉以至於無無則誠立明通誠立賢也明通聖也又曰聖可學乎曰可有要乎曰一為要一者無欲也無欲則靜虛動直靜虚則明明則通動直則公公則溥庶矣乎又云天地至公而已矣伊川謂公仁之理也公則物我兼照故仁所以能恕所以能愛伊川曰亦不須道閉目靜坐為可以養心又曰欲寡則心自誠又曰只有所向便是欲問凡運用處是心不伊川曰是意有心而後有意呂原明曰養者治也寡者少也欲者感物而動也治心之道莫善於少欲少欲則耳目之官不蔽於物而心常寜心常寜則定而不亂明而不暗道之所自生徳之所自成也不存焉者梏亡之謂孫宣公奭孟子正義曰梏手械也利欲之制善使不得為猶梏之制手也寡欲之人操其心而存之無有梏亡之患故雖有不存焉者寡矣其為人也多欲則好動而無節妄作而失常善端所由喪而天理虧焉故雖有存焉者寡矣是故心者性之用也可以成性可以失性得其養則道進而徳長所以成性失其養則反道敗徳所以失性謂人性本善反道敗徳則失其固然矣善養心者正其思而已目欲紛麗之色視思明則色欲寡矣胡衡麓曰思明者期見逺而不昏於亂色也耳欲鄭衛之聲聽思聰則聲欲寡矣胡衡麓曰思聰者必聽徳而不感於邪聲也口欲天下之美味思夏禹之菲飲食則口欲寡矣身欲天下之文繡思文王之卑服則身欲寡矣寡欲如此而心不治者未之有也孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂歟甚哉天下之難持者莫如心天下之易染者莫如欲伯益戒舜曰罔淫於樂召公戒武王曰玩人喪徳玩物喪志舜與武王猶且戒之敬者為禮之本子曰安上治民莫善於禮禮者敬而已矣又曰為禮不敬吾何以觀之哉胡衡麓曰敬為禮之實不敬則威儀俯仰與俳優之戲者何殊辭受取舍與市道之交者奚辨故三千三百之制必齋必莊必恭必肅為禮以敬為本故也范太史名祖禹字淳甫成都華陽人謂凡禮之體主敬敬者禮之所以立也何謂禮濂溪曰禮理也樂和也隂陽理而後和君君臣臣父父子子兄兄弟弟夫夫婦婦萬物各得其理然後和故禮先而樂後伊川先生曰推本而言禮只是一箇序樂只是一箇和又曰天下無一物無禮樂且如置兩隻椅子纔不正便是無序無序便乖乖便不和又曰盜賊至所謂不道者然亦有禮樂葢必有總屬必相聽順乃能為盜不然叛亂無統不能一日相聚而為盜也禮樂無處無之學者須要識得横渠謂禮本天之自然温公謂禮紀綱是也夫辨貴賤序親疎裁羣物制庶事非名不著非器不形名以命之器以别之然後上下粲然有倫此禮之大經也胡衡麓又曰禮者制心之防範其文采威儀足以固人肌膚之㑹筋骸之束其秩叙等衰足以杜人陵犯之態踰越之行絶滅禮法以放曠為達者此老莊之學也西晉𤣥虛之風葢由祖尚老莊所致爾胡衡麓曰老莊之學見周末文勝人皆從事於儀物度數不復有誠信為之主故欲掃除弊跡以趨乎本真而矯枉太過言言有失𤣥虚幽眇不切事情遂使末流遺略禮法忽棄實德浮游波蕩其為世害更甚於文之滅質何謂敬伊川曰主一之謂敬無適之謂一整齊嚴肅則心便一尹和靖曰只收斂身心便是主一如入神祠致敬時其心收斂著不得一毫髮事非主一而何或問敬莫是靜否伊川曰才説靜便入於釋氏之説也便是忘也近思録記伊川每見人靜坐便嘆其善學又當致思焉曲禮首言毋不敬而夫子亦曰執事敬雖之夷狄不可棄也伊川謂君子之遇事無巨細一於敬而已矣又知不獨指為禮而言也胡衡麓論云曰荒曰怠曰豫曰縱曰傲曰慢曰戲曰侮皆敬之反也曰慎曰戒曰儆曰畏曰恭曰祗曰寅曰肅皆敬之發也伊川曰今學者敬而不安者亦是大以敬來做事得重此恭而無禮則勞也禮是自然底道理只恭而不為自然底道理故不自在也須是恭而安今容貌必端言語必正者非是獨善其身要人道如何只是天理合如此本無私意只是箇循理而已明道亦云執事須是敬然不可矜持太過子路問君子子曰修己以敬曰如斯而已乎此五字宜玩味曰修己以安人又曰修己以安百姓胡衡麓謂安人安百姓乃修己以敬之效爾或問敬義何别伊川曰敬只是持己之道若只守一箇敬不知集義卻是都無事也且如欲為孝不成只守著一箇孝字須是知所以為孝之道所以侍奉當如何温凊當如何然後盡孝道也因記楊龜山答學者誠意問云自修身至于平天下莫不有道焉而皆以誠意為主茍無誠意雖有其道不能行也若謂意誠心正便足以平天下則先王之典章文物皆虛器也横渠以禮教學者使先有所據守伊川以敬為入徳之門又曰涵養須用敬明道謂敬則誠張横浦嘗語余云敬之一字乃克己私之利刃子勤者修業之本易曰天行健君子以自强不息伊川謂法天行之健也吕與叔謂天之誠行健而已人之誠自强不息而已又曰天之所以為天不已其命而已聖人之所以為聖不已其徳而已夫大禹惜寸隂成湯坐以待旦文王自朝至于日中昃不遑暇食召公告成王夙夜罔或不勤成王戒卿士業廣惟勤子張仲由問政夫子皆誨之以無倦聖人莫不以自暇自逸為戒也劉元城曰學者所守要道只勤一字盡矣能勤則邪僻無自而生纔有間斷便不可謂勤是亦不息之義胡安定與孫泰山名復字明復晉州平陽人復居泰山學春秋著尊王發微學者稱泰山先生富鄭公范文正公薦其道徳經術宜在朝廷趙康靖諸公共薦行為世法經為人師不冝棄之逺方齊魯學者多宗之故號為東學歐陽文忠公謂先生治春秋不惑傳註不為曲説以亂經其言簡易明於諸侯大夫功罪以考時之盛衰而推見王道之治亂得於經㫖本義為多嘉祐二年卒石徂徠三先生讀書泰山中攻苦食淡終夜不寢一坐十年不歸東學之倡自孫石二先生始歐陽文忠公謂孫明復居泰山之陽魯多學者其尤賢而有道者石介自介而下皆以弟子事之孔道輔為人剛直嚴重不妄與人聞先生之風就見之介執杖屨侍左右先生坐則立升降拜則扶之及其徃謝也亦然魯人既素重此二人由是始識師弟子之禮莫不嗟歎祖無擇姜潛龔鼎臣張洞劉牧李緼皆其門人也王沂公李文定公范文正公士建中賈同皆其師友也先忠肅公實師事龔姜云邵康節始學於百源堅苦刻厲冬不爐夏不扇夜不就席者數年富鄭公未第時讀書夜枕圎枕庶睡不能久欲有所思冬以冰雪夏以新水沃面其勤如此王荆公名安石字介甫撫州臨川人後居金陵著新經字説詔以其書立之於學熙豐已來其學盛行世謂之臨川學又曰新學吕惠卿蔡京蔡卞林希蹇序辰楊畏蔡肇皆門人之達者也舉進士甲科為州僉判每讀書達且略假寢日已髙亟上府多不及與潄常云學者當知其難而自强不息故自天子至於庶人進徳修業若存若亡而能成者未之有也雖然秦始皇衡石程書隋文帝衛士傳餐蘇秦引錐刺股非不勤也而不免于喪邦殺身者又不可不求其故也尹和靖云學者知篤志力行矣案尹和靖以下十二字原本誤作註文今改正徒將破碎大體不見聖賢之用心宜無取焉安定胡先生授學者必以經非治身正家致君庇民之術一切不以誨之主湖學也置治事齋學者欲明治道者講之於中如治民治兵水利算數之類伊川曰安定門人徃徃知稽古愛民矣則於為政也何有劉彝熙寜間召對曰聖人之道有體有用有文君臣父子仁義禮樂厯世不可變者其體也詩書史傳子集垂法後世者其文也舉而措之天下能潤澤其民歸于皇極者其用也國家累朝取士不以體用為本而尚其聲律浮華之詞是以風俗偷薄臣師瑗當寳元明道之間尤病其失遂明體用之學以授諸生今學者明夫聖人體用以為政教之本皆臣師之功也吕原明曰仁皇時太學之法寛簡胡翼之初為直講有㫖專掌一學之政胡亦甄别人物各因其所好類序而别名之故好尚經術者好談兵戰者好文藝者好節義者皆使之以類羣居相與講習又曰今讀是經而不知經之宏意大㫖以見之行事不若不讀之為愈也朱元晦曰秦漢已來學問不博儒者惟知章句訓詁之為事而不復知求聖人之意以明夫性命道徳之歸至于近世先知先覺之士始發明之則學者既有以知夫前日之為陋矣然或乃徒誦其言以為髙而又初不知深求其意甚者遂至于脱略章句陵籍訓詁坐談空妙展轉相迷而其為患又有甚于前日之為陋者嗚呼是豈古昔聖賢相傳之本意與夫近世先生君子之所望於後人者哉胡衡麓嘗語余曰若不通經謂能斷得古今世之治亂事之得失人之賢否及能立身行己者吾不信也縱其間或有是者亦偶然爾或問謝上蔡以講論經典二三説者當何從謝答曰用得即是驗之於心而安體之於身而可行斯是矣如求之或過於幽深證之或出於穿鑿而不取正於有道者未免有差如楊墨學仁義其流至於無君無父吳傳正語吕正獻公云毋弊其神於蹇淺皆學者所宜知案不取正于有道者以下原本俱誤作註文今改正求實用者窮經之本孟子謂窮則獨善其身達則兼善天下自修身至平天下之道皆實用也孔子謂伯魚曰學詩乎對曰未也不學詩無以言又曰學禮乎對曰未也不學禮無以立伊川曰窮經将以致用也如誦詩三百授之以政不達使於四方不能專對雖多亦奚以為今世之號為窮經者果能達政專對乎則其所謂窮經者章句之末耳此學者之大患也胡衡麓曰後世學者從事于章句耽玩于詞藻以為己則無増益智思之力為人則無制世御俗之略而所學遂為無用之具召之使論其所學為定其理或自出一義使人皆以意對為可否之當時政事俾之折衷故人皆樂從而有成今朝廷名臣徃徃胡之徒也余因悟成就人材之道不可拘以一法茍随其才而教育之焉得無成朝廷之用人學者之修業皆當然也明道謂學須就事上學邵康節曰學以人事為大今之經典古之人事也故其詩云人之所學本學人事人事不修無學何異胡衡麓謂易書開示中正得失之理表明吉凶悔吝之先使人知所避就詞若隠微皆指人事不如是則聖人豈固為𤣥談以無益于世乎而學易者徃徃歸易於虛無幽眇不涉世用而其所行則背義違理以趍乎悔吝之地其失本於人自人易自易而不知易即人也自何晏王弼以老子莊周之書釋大易王衍等競相慕效專事清談糟粕五經蔑棄敦實風流波蕩晉随以亡郭兼山名忠孝字立之自號兼山河南人曰有用者是聖人之道無用者非聖人之道學可用於天下方始是若未可用終未是尹和靖曰大抵為學貴乎有用而已竊謂釋氏以事理為障而除之故出家獨善而無其用此與吾儒之學不同也今吾儒徒知闢其教於事理用三者反不致力驗諸行事可見矣此愚之所未喻也胡衡麓曰學是道必習是事學仁必習仁之事伊川謂吾道非如釋氏一見了便從空寂去朱元晦謂余曰釋氏只要認得這箇精靈便休歇去而不求諸踐履之實也伊川又曰治經實學也如中庸一卷書自至理便推之於事如國家有九經凡厯代聖人之迹莫非實學也又曰六經浩渺乍來難盡曉且見得路徑後各自立得箇門庭歸而求之可矣又曰學者先須讀語孟窮得語孟自有要約處以此觀他經甚省力胡衡麓令余且先㸔孟子後問於張横浦答云論語含蓄未易經理㑹雖至妙之理只一兩句便了孟子須反復詳説初學讀之比之論語似易曉然亦未易觀葢孟子多散漫觀者須把他散漫處去尋他渾成處㸔又曰學者不守文義必須背失本意一向去理㑹文義又却滯泥不通温公謂許奉世云某自幼誦諸經直取其目前可用者而從之前賢髙奇之論皆如面牆劉元城云多聞闕疑愈於求合而强為之説也伊川謂讀書當平其心易其氣闕其疑則聖人之意見矣蘇東坡云聖人之言當以類成文而求其意時學率以一字斷遇其不同則異説生焉胡衡麓曰一字有數意貴知其指朱元晦語學者觀書法云且當玩味大意就自巳分上著實體驗不須細碎計較一兩字異同學問之道無他求之於心而已此是前聖緊切為人處就日用中下工夫其餘小小辨論俟他日亦未晚凡此皆先儒讀書法也讀書者多失在此數端商書曰非知之艱行之維艱伊川曰書曰非知之艱行之維艱此固是也然知之亦自艱譬如人欲徃京師必知是出那門行那路然後可徃如不知雖有欲徃之心其将何之自古非無美材能力行者鮮能明道以此可見知之亦難也伊川之説非不貴行也葢知之亦匪易恐其行之有差即孟子不明乎善不誠乎身之義後學誤認其意者多矣夫以知之一字為衆妙之門者釋氏之教也温公又云光也聞諸師友曰學者貴於行之而不貴於知之貴於有用而不貴於無用温公見末學徒務知而不力行故有是訓與書非知之艱夫子謂知之者不如好之樂之其義一也大抵温公之學以踐履立門庭不貴於徒知之耳張横浦謂行則見于實効知多止于説辭此語深救末學之病張敬夫云秦漢以來學者失其傳雖或有志於力行而其知不明莫適所依以卒背于中庸河南程子始以窮理居敬之方教人又于致知力行有所循守近歲學者皆失其指汲汲求所謂知而于躬行則忽焉此特未知二者互相發之故也胡文定謂釋氏但求見解于用處全不究竟學者亦可警矣昔胡衡麓謂余為學之方曰知仁勇三者闕一不可知則能分别仁則能守得定勇則能力行誠至論也尹和靖又曰先生遺書雖以講解而傳説使窮其根源謹其辭説茍不踐行等為虚語此先賢所以重講解慎言辭也明道謂言而不行是欺也劉元城謂説得一文不如行取一尺邵康節亦云尚言者必入於利也尚行者必入於義也言之於口不若行之於身行之於身不若盡之於心有詩曰口頭説得未必是手裏做成方是真亦聖人不以言取人聽其言而觀其行之意也竊謂欲知學問之所得驗諸行事方見猶之論醫要以能愈疾為良也楊龜山語游執中云常以晝驗之于妻子以觀其行之篤與否也夜考之夢寐以卜其志之定與未也陳了翁亦言學者須常自試以觀己之力量進否易曰或躍在淵自試也此聖學也東萊吕伯恭謂當於事事物物試驗學力若有窒礙齟齬處即深求病源所在而鋤去之又云凡事有齟齬必在我者有所未盡此其形而彼其影也於此觀省最為親切夫自明四端察五典至求實用凡七條皆進德修業之要推己及物者治道之本伊川曰修身齊家以至平天下者治之道也建立綱紀分正百職順天時以制事至於創制立度盡天下之務者治之法也治法即治之具也學者苟明治道不達乎治法其将何以寓道乎欲致治也難矣舍治道而恃法制以把持天下已非先王之政況專任刑法智力以持世可乎邵康節謂用公正則王用智力則霸孟子曰老吾老以及人之老幼吾幼以及人之幼天下可運於掌詩云刑于寡妻至于兄弟以御于家邦言舉斯心加諸彼而已老莊之教則以虚無淡泊為宗東坡謂其論君臣父子夫婦之間汎汎乎若萍游于江湖而適相值者商鞅韓非得其所以輕天下齊萬物之術是以敢為殘忍而無疑大抵於所厚者薄則無所不薄理勢然也伊川曰予奪翕張理所有也而老子之言非也予之之意乃在乎奪之張之之意乃在乎翕之權詐之術也申韓蘇張皆其流之敝也吕東萊論申韓之害流毒後世雖明君賢臣皆陷溺而不能出何也其令行禁止奔走天下樂其一時之快而不暇顧他日之害此其説所以盛行于世也竊謂老子予奪之説與管仲知予之為取何異又類隂謀耳因併記之大學為治之道不過乎所惡於上毋以使下所惡於下毋以事上葢天下雖廣其理則一兆民雖衆其情則同我所欲者人亦欲之我所惡者人亦惡之孟子論王道之要亦不過舉斯心推達充擴爾吕與叔謂舉斯心以加諸彼推而放諸四海而準無徃而非斯心也又伐柯解曰治己治人之道於己取之不必睨視之勞而自得於此矣范太史謂己欲安故安人己欲利故利人雖三王之治天下不過是也邵康節詩云能持己心達人心天下何憂不能治伊川曰恕者入仁之門為仁之方也李籲問臨政惟用心於恕何如伊川曰恕己所固有不待求而後得舉此加彼斯是矣何用心之云胡文定公謂恕有差處失於姑息胡衡麓曰凡言恕者一斷以尚寛從厚而已矣是悦夫恕之名而未嘗味夫己所不欲勿施於人之理也姑以治獄喻之殺人者死一也殺己之親使報足矣又遷怒以及其宗殺人之親或使末減又要隂報曰死者己不幸寜忍復為之戮人至乃蠲釋之假如人我易地彼以此見施吾其心服乎斯人也惟知有己不知有人此參彼己之要論修身者齊家之本易曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣胡衡麓曰子不敬承父事以傷其父心父又不能撫字其子而疾惡之弟不思天倫明序以慢其兄兄又不念同氣鞠養而憎棄之一家如此則一家潰敗天下如此尚何人理之有然後知堯舜之君唐虞之盛本於孝弟決非虛語也大學曰身修而後家齊家齊而後國治國治而後天下平自天子至於庶人壹是皆以修身為本中庸曰反身不誠不順乎親矣孟子曰家之本在身又曰身不行道不行於妻子夫閨門之内嚴過則傷恩慈過則瀆慢故濂溪謂家難而天下易家親而天下疎又曰家人睽必起于婦人故睽次家人以二女同居而其志不同行也唐張公藝九世同居髙宗問其所以能睦族之道公藝書忍字百餘以進其意以為宗族所以不協由尊長衣食或有不均卑幼禮節或有不備更相責望遂至乖爭苟能相與忍之則家道雍睦矣味忍之一字有以見包總之不易也惟修身慎行使之有所矜式而自化則恩不傷而用力寡故家人象曰君子以言有物而行有恒武陽朱漢上名震字子發學者稱漢上先生其學宗程氏先大夫受其易學謂言行有法而家人化卦終亦不過曰反身而已上九象曰威如之吉反身之謂也伊川謂威嚴不先行乎已則人怨而不伏威嚴即胡文定公私事公事一切苦森大抵正君御下以至治國平天下聖賢莫不以修身為先慎獨其要乎養心者事親之本曽子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食終養之是故父母之所愛亦愛之父母之所敬亦敬之至于犬馬盡然而況于人乎曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽元養曽子必有酒肉将徹不請所與問有餘曰亡矣将以復進也夫曽子養志者也曽元養口體者也孟子謂事親若曽子者可也子路曰啜菽飲水盡其歡斯之謂孝孟子曰不得乎親不可以為人不順乎親不可以為子而孝經云父有爭子則身不陷於不義故當不義則子不可以弗爭于父從父之令又焉得為孝乎然父子主恩非使之犯顔而逆諫禮曰父母有過下氣怡色柔聲以諫子曰事父母幾諫言諫於微則過未著而其從易也見志不從又敬不違言當起敬起孝起猶更也不違幾諫之初心期終以感動之也勞而不怨言身履勤苦自怨而慕庶幾親心之回不敢怨及父母也禮曰與其得罪於鄉黨州閭寜熟諫父母怒而撻之流血不敢疾怨起敬起孝案禮曰以下原本誤作註文今改正此養志之孝也信者交友之本詩序曰自天子至於庶人未有不須友以成者曽子曰君子以友輔仁舜敷五教一曰朋友有信子夏曰與朋友交言而有信雖曰未學吾必謂之學矣大學曰與國人交止於信則又不獨為朋友言也是故聖人以信易食胡衡麓謂信誠實是也伊川曰誠則信矣信則誠矣楊龜山謂一不信則舟中之人盡為敵國以事上則上疑以交朋友則朋友疑至於無徃而不為人所疑道何可行乎若夫尾生期女子於橋下水至不去抱柱溺死非無信也又須信近於義可也正君心者治國之本魯哀公問政於孔子孔子對曰政者正也君為政則百姓從之矣君之所為百姓之所從也君所不為百姓何從孟子曰人不足與適也政不足與間也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣胡衡麓曰莫難强如怠心莫難制如欲心莫難降如驕心莫難平如怒心莫難抑如忌心莫難正如僻心然皆放心也大人格君心之非者格此等也格猶捍云爾未至乎大人而當大人之任亦當勉焉使君心常收而不放則善日起惡日銷治可立安可保矣荀子曰君者人之源也源清則流清源濁則流濁明道云天下治亂繫乎人君仁不仁耳離是而非則生於其心必害於其政豈待乎作之於外哉昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心心正則天下之事從而理也夫政事之失用人之非智者能更之直者能諫之然非心存焉則一事之失救而正之後之失者将不勝救矣格其非心使無不正非大人其孰能之楊龜山曰孟子言人不足與適也政不足與間也惟大人為能格君心之非葢人與政俱不足道則須使人君心術開悟然後天下事可循序整頓然格君心之非須要大人之徳大人過人處只是正己正己則上可以正君下可以正人今之賢者多尚權智不以正己為先縱得好時節終是做不徹或謂權智之人亦可以救時據某所見正不欲得如此人在人君左右壊人君心術又曰人臣事君豈可佐以刑名之説是使人主失人心也無人心則不足以得人能使其君視民如傷則王道行矣又曰孟子與人君言皆所以擴其善心而格其非不止就事論事如論齊王之愛牛而曰是心足以王論王之好樂而使之與百姓同樂論王之好貨好色好勇而陳周之先王之事臨卭訃虞卿名用章西蜀大儒也有云人主不冝有所好故好征戰則孫武白起之徒出而民殘於干戈矣好刑名則韓非張湯之徒出而民苦於刻核矣好聚斂則桑羊皇甫鎛之徒出而民困於掊克矣好順從則張禹胡廣之徒出而民敝於誇大矣歐陽文忠公謂鬼谷子馳説諸侯必因其喜怒哀樂好惡而捭闔之故天下諸侯無不在其術中者惟不見其所好者則不可得而説也蘇秦張儀得其學而為縱横邵康節曰邪正之由繫乎上之所好也上好德則民用正上好佞則民用邪邪正之由有自來也成王戒君陳亦曰違上所命從厥攸好言不從令而從其好也范太史曰所用之人所行之政皆出於君心人不足責政不足非此由臣不能正君君心不正是以如此惟得大人然後可以正君心此非小人之所能也孟子云居仁由義大人之事備矣大人之事正己而物正者也居仁由義先自治而後治人先正己而物自正故能正君不正己則不能正人豈能正君張敬夫云格之為言感通至到也書曰格于上帝葢君心之非不可以氣力勝必也感通至到而俾之自消靡焉所謂格也葢積其誠意一動一静一語一黙無非格之之道也若心非未格雖易其人才更其政事幸其見聽而肯改易他日之所用所行亦未必是也何者其本源不正不可勝救也心非既格則人才政事将自日新矣然而格君之業非大人則不能若在己之非猶有未之能克者而将何以盡夫感通之道哉後世論治者不過及於人才政事而止矣孰知其本在於君心而又孰知格君之本乃在於吾身乎惟大人為能格君心之非孟子斯言真萬世不可得而易者也昔司馬温公論漢孝元優柔不斷讒佞用權當時之大患也而貢禹不以為言恭謹節儉孝元素志而禹孜孜言之何哉又要在識其偏處之審爾東坡論唐陸宣公云徳宗以苛刻為能而諫之以忠厚以猜疑為術而勸之以推誠好用兵而以銷兵為先好聚財而以散財為急若宣公可謂善正其偏者也審勢者安天下之本陸宣公云立國之安危在勢濂溪曰天下勢而已矣勢重輕也極重不可反識其重而亟反之可也反之力也識不早力不易也力而不競天也不識不力人也天乎人也何尤温公曰上行下效謂之風薰蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及風化已失流俗已成則雖有辯智弗能諭也强毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫之能變也伊川云混一之形如萬頃之澤而善為治者莫善乎靜以守之而或擾之如風過乎澤波濤洶動平之實難故一正則難傾一傾則難正者今日天下之勢也富鄭公遺奏云願陛下審觀天下之勢東坡曰如周如唐則外重而内輕如秦如魏則外輕而内重内重之弊必有姦臣指鹿之患外重之弊必有大國問鼎之憂聖人方盛而慮衰常先立法以救弊董仲舒曰三王所祖不同夏尚忠殷尚質周尚文非其相反将以救溢扶衰所遭之變然也濂溪拙賦云嗚呼天下拙刑政徹上安下順風清弊絶豈非意欲救之以質歟竊謂今有志於天下者宜於此賦致思焉章丞相紹聖初問陳了翁以當世之務了翁曰請以所乘舟為喻偏重其可行乎移左置右其偏一也明此其可行矣楊龜山曰陳瑩中言乘舟事最好然元祐舟不知為甚装得太重及紹聖時不知卻如何亦偏多載了據此兩舟所載者因何物得重今當減去何物則適平若被人問到此須要處置始得如是本分處置得事之人必須有規矩繩墨一一調和得是不令錯了若只説得總腦便休亦不濟事孟子言天下可運於掌如彼所言天下誠可運於掌也唐文宗亦云天下之勢猶持衡此首重則彼尾輕矣竊謂豈獨天下之勢一州一縣皆然也自推己及物至審勢凡六條皆治道之要也明本釋卷上
